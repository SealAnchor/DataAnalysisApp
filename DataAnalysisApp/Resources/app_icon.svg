  <circle cx="128" cy="128" r="120" fill="#2196F3"/>
  
  <!-- CSV文件图标 -->
  <rect x="70" y="60" width="116" height="136" rx="8" fill="white"/>
  
  <!-- 文件折角 -->
  <path d="M 150 60 L 150 90 L 186 90" fill="#E3F2FD"/>
  <path d="M 150 60 L 150 90 L 186 90 L 150 60" fill="#BBDEFB"/>
  
  <!-- CSV文字 -->
  <text x="128" y="115" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1976D2" text-anchor="middle">CSV</text>
  
  <!-- 数据表格线条 -->
  <rect x="85" y="130" width="86" height="8" rx="2" fill="#E0E0E0"/>
