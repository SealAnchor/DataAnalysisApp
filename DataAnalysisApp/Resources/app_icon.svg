  <rect x="85" y="175" width="60" height="8" rx="2" fill="#E0E0E0"/>
  
  <!-- 图表图标 -->
  <rect x="165" y="130" width="8" height="50" rx="2" fill="#4CAF50"/>
  <rect x="178" y="145" width="8" height="35" rx="2" fill="#FF9800"/>
  <rect x="191" y="155" width="8" height="25" rx="2" fill="#F44336"/>
